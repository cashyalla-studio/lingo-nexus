name: lingo_nexus
description: "Scripta Sync: Audio shadowing & AI language tutor"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.0.0
  just_audio: ^0.10.5
  path_provider: ^2.1.5
  file_picker: ^10.3.10
  path: ^1.9.1
  http: ^1.3.0
  google_fonts: ^8.0.2
  audio_waveforms: ^2.0.2
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.3.0
  record: ^5.2.0
  http_parser: ^4.1.2
  google_sign_in: ^6.2.2
  ffmpeg_kit_flutter_new: ^4.1.0
  share_plus: ^10.1.4
  archive: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  record_linux: ^1.3.0

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "design/icon.png"
  image_path: "design/icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - design/icon_final.png
